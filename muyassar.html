<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ميسّر — اشتري الآن، ادفع براحتك</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;direction:rtl;background:#DDE8DF;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
#root{width:100%;max-width:390px;height:844px;background:#F5F7FA;border-radius:50px;border:1px solid #D0DDD2;position:relative;overflow:hidden;box-shadow:0 40px 90px rgba(0,0,0,.14),0 0 0 6px #fff;margin:0 auto}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:110px;height:30px;background:#1a1a1a;border-radius:0 0 18px 18px;z-index:20}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding-bottom:88px;scrollbar-width:none;background:#F5F7FA;display:none}
.screen.active{display:block}
.screen::-webkit-scrollbar{display:none}
.screen-full{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;background:#F5F7FA;display:none}
.screen-full.active{display:block}
.screen-full::-webkit-scrollbar{display:none}

/* Buttons */
.btn{width:100%;padding:16px;border-radius:16px;border:none;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.btn-g{background:linear-gradient(135deg,#10B981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.35)}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.45)}
.btn-g:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-ghost{background:#fff;border:1.5px solid #D4E8DB;color:#4A6455}
.btn-ghost:hover{border-color:#10B981;color:#10B981}
.btn-sm{padding:10px 20px;width:auto;font-size:14px;border-radius:12px}

/* Cards */
.card{background:#fff;border:1px solid #E8EDE9;border-radius:20px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.card-g{background:#E8F5EF;border:1px solid #C6E8D6;border-radius:20px;padding:16px}

/* Input */
.inp{width:100%;background:#fff;border:1.5px solid #E2EAE4;border-radius:14px;padding:13px 16px;color:#0D1F14;font-family:'Tajawal',sans-serif;font-size:15px;outline:none;transition:all .25s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.inp:focus{border-color:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.inp::placeholder{color:#9BB5A3}

/* Tabs */
.tab-bar{display:flex;background:#EEF3EF;border-radius:14px;padding:4px;gap:4px}
.tab{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;background:transparent;color:#8FA898}
.tab.on{background:#fff;color:#10B981;box-shadow:0 1px 6px rgba(0,0,0,.08)}

/* Chips */
.chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;border:1.5px solid transparent;font-family:'Tajawal',sans-serif}
.chip.on{background:#E8F5EF;color:#10B981;border-color:#C6E8D6}
.chip.off{background:#fff;color:#7A9E8A;border-color:#E2EAE4}

/* Modal */
.modal-bg{position:absolute;inset:0;background:rgba(13,31,20,.4);backdrop-filter:blur(8px);z-index:40;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:32px 32px 0 0;padding:28px 24px 44px;width:100%;animation:slideUp .35s ease;border-top:2px solid #E8F5EF;max-height:82vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.1)}

/* Bottom Nav */
.bnav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:1px solid #EAF0EB;padding:8px 4px 20px;display:flex;justify-content:space-around;z-index:30;box-shadow:0 -2px 16px rgba(0,0,0,.06)}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;border-radius:14px;font-size:10px;font-weight:700;color:#9BB5A3;border:none;background:transparent;font-family:'Tajawal',sans-serif;transition:all .2s}
.bnav-btn.on{color:#10B981;background:#E8F5EF}

/* Pin */
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid #C6E8D6;transition:all .25s;background:#EEF3EF}
.pin-dot.filled{background:#10B981;border-color:#10B981}
.pin-key{width:72px;height:72px;border-radius:22px;background:#fff;border:1.5px solid #E2EAE4;color:#0D1F14;font-family:'Tajawal',sans-serif;font-size:22px;font-weight:800;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.pin-key:hover{background:#E8F5EF;border-color:#10B981}
.pin-key:active{transform:scale(.93)}

/* Toast */
.notif-toast{position:absolute;top:44px;left:12px;right:12px;background:#fff;border:1px solid #C6E8D6;border-radius:16px;padding:14px 16px;z-index:50;display:flex;gap:12px;align-items:center;box-shadow:0 8px 28px rgba(0,0,0,.1)}

/* Onboarding dots */
.ob-dot{height:6px;border-radius:3px;transition:all .4s;background:#D4E8DB}
.ob-dot.a{width:22px;background:#10B981}
.ob-dot.d{width:6px}

/* Back button */
.back-btn{width:38px;height:38px;border-radius:12px;background:#F5F7FA;border:1.5px solid #E2EAE4;cursor:pointer;color:#0D1F14;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

/* Progress bar */
.progress-bar{height:8px;background:#EEF3EF;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease;background:linear-gradient(90deg,#10B981,#34D399)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 24px rgba(16,185,129,.3)}50%{box-shadow:0 0 55px rgba(16,185,129,.6)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes orbit{from{transform:rotate(0deg) translateX(38px) rotate(0deg)}to{transform:rotate(360deg) translateX(38px) rotate(-360deg)}}
@keyframes notifSlide{from{transform:translateX(110%)}to{transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pinDot{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes checkPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
@keyframes badgeIn{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
</style>
</head>
<body>

    <button class="bnav-btn" data-nav="profile" onclick="go('profile')"><span style="font-size:19px">👤</span>حسابي</button>
  </nav>

  <!-- TOAST -->
  <div class="notif-toast" id="toast" style="display:none;animation:notifSlide .35s ease">
    <div id="toast-icon" style="font-size:24px"></div>
    <div style="flex:1">
      <div id="toast-title" style="font-size:13px;font-weight:700;color:#0D1F14"></div>
      <div id="toast-sub" style="font-size:12px;color:#6A8E7A;margin-top:2px"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════

var PRODUCTS = [
  {id:1,name:'آيفون 15 برو',store:'نون',cat:'إلكترونيات',price:4999,img:'📱',cashback:'2%',rating:4.8,installments:[4,6,12],badge:'الأكثر مبيعاً'},
  {id:2,name:'سماعة سوني XM5',store:'أمازون',cat:'إلكترونيات',price:1299,img:'🎧',cashback:'1.5%',rating:4.7,installments:[4,6],badge:''},
  {id:3,name:'حذاء نايك',store:'أديداس',cat:'رياضة',price:599,img:'👟',cashback:'2%',rating:4.5,installments:[4],badge:'عرض محدود'},
  {id:4,name:'عطر أرماني',store:'سيفورا',cat:'جمال',price:420,img:'🌹',cashback:'1.5%',rating:4.6,installments:[4,6],badge:''},
  {id:5,name:'طاولة مكتبية',store:'إيكيا',cat:'أثاث',price:850,img:'🪑',cashback:'1%',rating:4.3,installments:[4,6,12],badge:''},
  {id:6,name:'جاكيت H&M',store:'H&M',cat:'أزياء',price:320,img:'🧥',cashback:'1.5%',rating:4.4,installments:[4],badge:'جديد'},
];

var NAV_SCREENS = ['home','shop','wallet','notifs','profile'];

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function go(screen) {
  // Hide all
  document.querySelectorAll('.screen, .screen-full').forEach(function(s) {
    s.classList.remove('active');
    s.style.display = '';
  });

  var el = document.getElementById('screen-' + screen);
  if (!el) return;

  // Show
  if (el.classList.contains('screen-full')) {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  } else {
    el.style.display = 'block';
  }
  el.classList.add('active');
  el.scrollTop = 0;

  // Nav
  var bnav = document.getElementById('bnav');
  if (NAV_SCREENS.indexOf(screen) >= 0) {
    bnav.style.display = 'flex';
    document.querySelectorAll('.bnav-btn').forEach(function(b) {
      b.classList.toggle('on', b.dataset.nav === screen);
    });
  } else {
    bnav.style.display = 'none';
  }

  state.prevScreen = state.screen;
  state.screen = screen;

  // Render
  renderScreen(screen);
}

function goBack() {
  var prev = state.prevScreen || 'home';
  if (['home','shop','wallet','notifs','profile'].indexOf(prev) < 0) prev = 'home';
  go(prev);
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(icon, title, sub) {
  var t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-sub').textContent = sub;
  t.style.display = 'flex';
  if (state.toastTimer) clearTimeout(state.toastTimer);
  state.toastTimer = setTimeout(function() { t.style.display = 'none'; }, 3000);
}

// ═══════════════════════════════════════
// RENDER SCREENS
// ═══════════════════════════════════════
function renderScreen(screen) {
  var fn = {
    'onboarding': renderOnboarding,
    'auth': renderAuth,
    'pin-setup': renderPinSetup,
    'pin-login': renderPinLogin,
    'home': renderHome,
    'shop': renderShop,
    'wallet': renderWallet,
    'orders': renderOrders,
    'profile': renderProfile,
    'deals': renderDeals,
    'notifs': renderNotifs,
    'checkout': renderCheckout,
    'postpone': renderPostpone,
    'budget': renderBudget,
    'rewards': renderRewards,
    'goal': renderGoal,
  }[screen];
  if (fn) fn();
}

// ═══════════════════════════════════════
// ONBOARDING
// ═══════════════════════════════════════
var OB_DATA = [
  {color:'#10B981',title:'اشتري الآن، ادفع براحتك',sub:'قسّم أي مشتريات على 4 أقساط متساوية — بدون فوائد، بدون رسوم خفية',
   illus:'<div style="width:100px;height:100px;border-radius:28px;background:linear-gradient(135deg,#10B981,#065F46);display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900;color:#fff;animation:glow 2s ease-in-out infinite">م</div>'},
  {color:'#F59E0B',title:'اكسب نقاط مع كل قسط',sub:'كل قسط يكسبك نقاط ذهبية — استبدلها بخصومات في متاجرك المفضلة',
   illus:'<div style="width:120px;height:120px;border-radius:50%;background:rgba(245,158,11,.12);border:2px solid rgba(245,158,11,.3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;animation:pulse 2s ease-in-out infinite"><div style="font-size:38px">✦</div><div style="font-size:22px;font-weight:900;color:#F59E0B">830</div><div style="font-size:11px;color:#6A8E7A">نقطة</div></div>'},
  {color:'#38BDF8',title:'قسّط مع أصدقائك',sub:'أول تطبيق يتيح الشراء الجماعي — كل شخص يدفع نصيبه باستقلالية',
   illus:'<div style="width:80px;height:80px;border-radius:50%;background:rgba(56,189,248,.15);border:2px solid rgba(56,189,248,.4);display:flex;align-items:center;justify-content:center;font-size:36px">◈</div>'},
];

function renderOnboarding() {
  var el = document.getElementById('screen-onboarding');
  var d = OB_DATA[state.obIdx];
  var dots = OB_DATA.map(function(_,i) {
    return '<div class="ob-dot ' + (i===state.obIdx?'a':'d') + '"></div>';
  }).join('');

  el.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:space-between;height:100%;padding:60px 28px 48px">'
    + '<div style="text-align:center;animation:fadeDown .4s ease">'
    + '<div style="font-size:28px;font-weight:900;color:#0D1F14;margin-bottom:8px">ميسّر</div>'
    + '<div style="font-size:13px;color:#6A8E7A">التقسيط الذكي</div>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;align-items:center;gap:28px;animation:scaleIn .5s ease">'
    + '<div style="width:200px;height:200px;display:flex;align-items:center;justify-content:center">' + d.illus + '</div>'
    + '<div style="text-align:center">'
    + '<div style="font-size:22px;font-weight:900;color:#0D1F14;margin-bottom:12px;line-height:1.3">' + d.title + '</div>'
    + '<div style="font-size:14px;color:#6A8E7A;line-height:1.6">' + d.sub + '</div>'
    + '</div>'
    + '</div>'
    + '<div style="width:100%">'
    + '<div style="display:flex;justify-content:center;gap:6px;margin-bottom:24px">' + dots + '</div>'
    + '<button class="btn btn-g" onclick="obNext()">' + (state.obIdx<2 ? 'التالي ←' : 'ابدأ الآن') + '</button>'
    + (state.obIdx>0 ? '<button class="btn btn-ghost" style="margin-top:10px" onclick="go(\'auth\')">تخطَّ</button>' : '')
    + '</div>'
    + '</div>';
}

function obNext() {
  if (state.obIdx < 2) {
    state.obIdx++;
    renderOnboarding();
  } else {
    go('auth');
  }
}

// ═══════════════════════════════════════
// AUTH
// ═══════════════════════════════════════
function renderAuth() {
  var el = document.getElementById('screen-auth');
  el.innerHTML = '<div style="padding:60px 28px 40px;display:flex;flex-direction:column;height:100%">'
    + '<div style="text-align:center;margin-bottom:40px;animation:fadeDown .4s ease">'
    + '<div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#10B981,#065F46);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#fff;margin:0 auto 16px;animation:glow 2s infinite">م</div>'
    + '<div style="font-size:24px;font-weight:900;color:#0D1F14">أهلاً بك في ميسّر</div>'
    + '<div style="font-size:14px;color:#6A8E7A;margin-top:6px">سجّل دخولك للمتابعة</div>'
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:14px;animation:fadeUp .4s ease">'
    + '<input class="inp" id="auth-phone" type="tel" placeholder="رقم الجوال" style="text-align:center;font-size:18px;letter-spacing:2px">'
    + '<input class="inp" id="auth-name" type="text" placeholder="الاسم الكامل" style="text-align:center">'
    + '</div>'

function renderPinScreen(title, sub, onDone) {
  return '<div style="display:flex;flex-direction:column;align-items:center;height:100%;padding:80px 28px 48px">'
    + '<div style="text-align:center;margin-bottom:40px;animation:fadeDown .4s ease">'
    + '<div style="font-size:22px;font-weight:900;color:#0D1F14">' + title + '</div>'
    + '<div style="font-size:14px;color:#6A8E7A;margin-top:8px">' + sub + '</div>'
    + '</div>'
    + '<div style="display:flex;gap:16px;margin-bottom:48px" id="pin-dots">' + renderPinDots() + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(3,72px);gap:12px;justify-content:center">'
    + [1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(function(k) {
      if (k === '') return '<div></div>';
      return '<button class="pin-key" onclick="pinPress(\'' + k + '\',\'' + onDone + '\')">' + k + '</button>';
    }).join('')
    + '</div>'
    + '</div>';
}

function renderPinDots() {
  return [0,1,2,3].map(function(i) {
    return '<div class="pin-dot' + (i < state.pinEntry.length ? ' filled' : '') + '"></div>';
  }).join('');
}

function renderPinSetup() {
  var el = document.getElementById('screen-pin-setup');
  el.innerHTML = renderPinScreen('أنشئ رمز الدخول', 'سيُستخدم للتحقق من هويتك', 'setup');
}

function renderPinLogin() {
  var el = document.getElementById('screen-pin-login');
  el.innerHTML = renderPinScreen('أدخل رمز الدخول', 'مرحباً بعودتك! 👋', 'login');
}

function pinPress(k, mode) {
  if (k === '⌫') {
    state.pinEntry = state.pinEntry.slice(0,-1);
  } else if (state.pinEntry.length < 4) {
    state.pinEntry += k;
  }
  document.getElementById('pin-dots').innerHTML = renderPinDots();
  if (state.pinEntry.length === 4) {
    setTimeout(function() {
      if (mode === 'setup') {
        state.pin = state.pinEntry;
        state.pinEntry = '';
        state.loggedIn = true;
        showToast('✅','تم إنشاء الرمز','يمكنك الآن الدخول بأمان');
        go('home');
      } else {
        if (state.pinEntry === state.pin || state.pin === '') {
          state.pinEntry = '';
          state.loggedIn = true;
          go('home');
        } else {
          state.pinEntry = '';
          document.getElementById('pin-dots').innerHTML = renderPinDots();
          showToast('❌','رمز خاطئ','حاول مرة أخرى');
          document.getElementById('screen-pin-login').style.animation = 'shake .3s ease';
          setTimeout(function() { document.getElementById('screen-pin-login').style.animation = ''; }, 300);
        }
      }
    }, 150);
  }
}

        + '<div style="font-size:16px;font-weight:900;color:#10B981">' + g.saved.toLocaleString() + '</div>'
        + '<div style="font-size:11px;color:#8FA898">من ' + g.target.toLocaleString() + '</div>'
        + '</div>'
        + '</div>'
        + '<div class="progress-bar" style="margin-bottom:12px"><div class="progress-fill" style="width:' + pct + '%"></div></div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center">'
        + '<div style="background:#E8F5EF;border-radius:10px;padding:8px 12px">'
        + '<div style="font-size:11px;color:#4A6455">القسط الشهري</div>'
        + '<div style="font-size:16px;font-weight:900;color:#10B981">' + monthly.toLocaleString() + ' ر.س</div>'
        + '</div>'
        + '<button onclick="showToast(\'✅\',\'تم دفع الدفعة!\',\'شكراً على الالتزام\')" class="btn btn-g btn-sm" style="width:auto">ادفع الآن</button>'
        + '</div>'
        + '</div>';
    }).join('')
    + '</div>';
}

function addGoal() {
  showToast('🎯','إضافة هدف جديد','قريباً!');
}

renderScreen('onboarding');
</script>
